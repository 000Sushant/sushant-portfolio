<footer class="footer">
  <div class="footer-glow"></div>
  <div class="container">
    <div class="footer-top">
      <!-- Logo -->
      <div class="footer-brand">
        <span class="logo-bracket">&lt;</span>
        <span class="logo-name">Sushant Kumar</span>
        <span class="logo-bracket">/&gt;</span>
        <p class="footer-tagline">Building scalable systems, one commit at a time.</p>
      </div>

      <!-- Nav Links -->
      <nav class="footer-nav">
        <a *ngFor="let l of links" [href]="l.href" class="footer-link">{{ l.label }}</a>
      </nav>

      <!-- Socials -->
      <div class="footer-socials">
        <a *ngFor="let s of socials" [href]="s.href" class="social-icon" target="_blank" [title]="s.label">
          <i [class]="s.icon"></i>
        </a>
      </div>
    </div>

    <div class="footer-bottom">
      <div class="footer-divider"></div>
      <p class="footer-copy">
        Crafted with
        <i class="fa-solid fa-heart footer-heart"></i> by <span class="gradient-text">Sushant Kumar</span>.
      </p>
    </div>
  </div>
</footer>
